<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <!-- Golden radial gradient -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="1"/>
      <stop offset="50%" stop-color="#d4af37" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#b8962e" stop-opacity="0"/>
    </radialGradient>

    <!-- Flame gradient -->
    <linearGradient id="flame" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#b8962e"/>
      <stop offset="40%" stop-color="#d4af37"/>
      <stop offset="70%" stop-color="#e8c84a"/>
      <stop offset="100%" stop-color="#fff8dc"/>
    </linearGradient>

    <!-- Soft glow filter -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background glow -->
  <circle cx="24" cy="26" r="18" fill="url(#glow)"/>

  <!-- Divine flame/light form -->
  <path
    d="M24 6
       C24 6 32 16 32 26
       C32 32 28.5 36 24 36
       C19.5 36 16 32 16 26
       C16 16 24 6 24 6Z"
    fill="url(#flame)"
    filter="url(#softGlow)"
  />

  <!-- Inner light -->
  <ellipse cx="24" cy="28" rx="4" ry="6" fill="#fff8dc" opacity="0.6"/>

  <!-- Spark at tip -->
  <circle cx="24" cy="10" r="1.5" fill="#ffffff" opacity="0.9"/>
</svg>
