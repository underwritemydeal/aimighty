name = "aimighty-api"
main = "index.ts"
compatibility_date = "2024-01-01"

[vars]
# Secrets are set via `wrangler secret put <NAME>`:
#   ANTHROPIC_API_KEY
#   OPENAI_API_KEY
#   RESEND_API_KEY
#   STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET

# KV namespace for article generation + email subscribers + user tier
[[kv_namespaces]]
binding = "ARTICLES"
id = "8e9f4fd21df54bb985d6bfcb3e414910"

# Cron trigger — daily newsletter at 15:00 UTC (7am PST)
[triggers]
crons = ["0 15 * * *"]
